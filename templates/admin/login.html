<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLAPP — Operational Hub Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .login-card { max-width: 420px; width: 100%; border-radius: 1.25rem; }
    .brand-logo { width: 56px; height: 56px; border-radius: 16px; background: #1e293b; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .brand-logo span { color: #fff; font-weight: 800; font-size: 1.3rem; }
  </style>
</head>
<body class="vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="login-card card shadow-sm border-0 p-4">
    <div class="card-body text-center">
      <div class="brand-logo"><span>GA</span></div>
      <h4 class="fw-bold mb-1">GLAPP Operational Hub</h4>
      <p class="text-muted small mb-4">Authorized administrators only</p>

      {% if form.errors %}
      <div class="alert alert-danger py-2 small" role="alert">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="post" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="text-start mb-3">
          <label class="form-label small fw-semibold text-muted">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
        </div>
        <div class="text-start mb-4">
          <label class="form-label small fw-semibold text-muted">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
